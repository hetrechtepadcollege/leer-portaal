<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sīrah Tijdlijn | Het Rechte Pad College</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="portal-nav">
    <img src="images/HRPC-logo.png" alt="HRPC Logo" class="nav-logo">
    <span class="nav-title"></span>
</nav>

<main class="page-shell">
    <section class="hero">
        <p class="eyebrow">Interactieve Sirah Ervaring</p>
        <h1>De Sīrah van de Profeet Mohammed ﷺ</h1>
        <p class="subtext">Swipe, scroll en ontdek de sleutelmomenten van Mekka tot Madinah in een visuele tijdlijn.</p>
    </section>

    <section class="timeline-stage">
        <div class="timeline-line" aria-hidden="true"></div>
        <div class="timeline-container" id="timeline" aria-label="Horizontale Seerah tijdlijn"></div>
    </section>

    <section class="controls">
        <label for="year-slider">Spring naar jaar</label>
        <input type="range" id="year-slider" min="0" max="0" value="0" step="1" aria-label="Seerah jaar slider">
        <div class="milestone-row" id="milestone-row"></div>
    </section>
</main>

<div class="portal-home-wrap">
    <a href="https://leer.hetrechtepadcollege.nl/" class="portal-home-btn">
        Terug naar Leerportaal
    </a>
</div>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-panel">
        <button class="close" id="modal-close" aria-label="Sluiten" onclick="closeModal()">&times;</button>
        <p id="modal-year" class="year-badge"></p>
        <h2 id="modal-title"></h2>
        <p id="modal-description" class="modal-description"></p>
        <figure class="media-block" id="image-wrap"></figure>
        <div class="media-block" id="video-wrap"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
